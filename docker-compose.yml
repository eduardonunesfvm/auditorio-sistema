services:
  api:
    build:
      context: ./projeto-auditorio
      dockerfile: Dockerfile
    container_name: auditorio-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY:-sua-chave-secreta-super-segura-aqui}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./auditorio-front
      dockerfile: Dockerfile
    container_name: auditorio-front
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
