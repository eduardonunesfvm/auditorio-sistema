services:
  db:
    image: postgres:15-alpine
    container_name: auditorio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-2212}
      POSTGRES_DB: ${POSTGRES_DB:-auditorio_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-auditorio_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./projeto-auditorio
      dockerfile: Dockerfile
    container_name: auditorio-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-2212}@db:5432/${POSTGRES_DB:-auditorio_db}
      SECRET_KEY: ${SECRET_KEY:-sua-chave-secreta-super-segura-aqui}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./auditorio-front
      dockerfile: Dockerfile
    container_name: auditorio-front
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
